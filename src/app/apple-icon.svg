  <path
    d="M127 64c-8-9-20-15-33-15-24 0-44 19-44 41s20 41 44 41c13 0 25-6 33-15l-14-12c-5 6-12 9-19 9-13 0-25-11-25-23s12-23 25-23c7 0 14 3 19 9l14-12z"
    fill="#ffffff"
  />
  <circle cx="138" cy="138" r="12" fill="#ffffff" />
</svg>
