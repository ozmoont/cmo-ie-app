<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 180 180"
  width="180"
  height="180"
>
  <!--
    Apple touch icon — what shows when someone "Add to Home Screen"
    on iOS. Bigger viewBox than icon.svg (180×180 is Apple's
    recommended size) so the C + dot read crisply on a phone home
    screen. Same brand visual as icon.svg, scaled.
  -->
