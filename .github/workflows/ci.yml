name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new push comes in.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --include=optional works around the npm optional-deps bug that
      # affects platform-specific native bindings (e.g. rolldown's
      # @rolldown/binding-linux-x64-gnu). See:
      # https://github.com/npm/cli/issues/4828
      - name: Install dependencies
        run: npm ci --include=optional

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run
